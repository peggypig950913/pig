<body>
  <h1>🔥 AI FatBurn Game 🔥</h1>
  <video id="camera" autoplay playsinline></video>

  <p>玩家血量: <span id="player_hp"></span></p>
  <p>Boss血量: <span id="boss_hp"></span></p>
  <p>消耗卡路里: <span id="calories"></span></p>
  <p>分數: <span id="score"></span></p>
  <h2 id="game_result"></h2>
  <p id="final_calories"></p>
  <p id="food_equiv"></p>
  <button id="restart_btn" style="display:none;" onclick="restartGame()">重新開始</button>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById('camera').srcObject = stream;
    const video = document.getElementById('camera');
    setInterval(() => {
      captureAndSend(video);
    }, 1000); // 每秒送一次影像到後端
  });
